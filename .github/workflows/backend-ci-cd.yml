name: Backend CI/CD

on:
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci-cd.yml"

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          # Keep deterministic tests and avoid accidental external calls.
          OPENAI_API_KEY: ""
        run: |
          pytest -q

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to VPS
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            -e "ssh -p ${{ secrets.VPS_SSH_PORT }}" \
            ./ "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"

      - name: Install deps and restart service
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e
          cd "${{ secrets.VPS_APP_DIR }}"

          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          sudo systemctl daemon-reload
          sudo systemctl restart "${{ secrets.VPS_SYSTEMD_SERVICE }}"
          sudo systemctl is-active --quiet "${{ secrets.VPS_SYSTEMD_SERVICE }}"
          EOF
